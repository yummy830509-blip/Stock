<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>市場預言機</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #050505;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Noto Serif TC', Georgia, serif;
      padding: 20px; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    .header { text-align: center; margin-bottom: 24px; opacity: 0; animation: fadeUp .6s ease .2s forwards; }
    .header-sub { font-family: 'Courier Prime', monospace; font-size: 10px; letter-spacing: 8px; color: rgba(255,255,255,.22); margin-bottom: 6px; }
    .header-date { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,.15); }
    .markets { display: flex; gap: 10px; width: 100%; max-width: 420px; opacity: 0; animation: fadeUp .8s ease .3s forwards; }
    .market-card {
      flex: 1; border: 1px solid rgba(255,255,255,.08); border-radius: 2px;
      padding: 18px 10px; text-align: center;
      background: rgba(0,0,0,.55); backdrop-filter: blur(12px);
      position: relative; transition: border-color 1s ease, box-shadow 1s ease;
    }
    .market-name { font-family: 'Courier Prime', monospace; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,.3); margin-bottom: 14px; }
    .market-arrow { font-family: 'Courier Prime', monospace; font-size: 36px; line-height: 1; margin-bottom: 6px; transition: color 1s ease; }
    .market-label { font-size: 18px; font-weight: 900; letter-spacing: 4px; margin-bottom: 4px; transition: color 1s ease; }
    .market-eng { font-family: 'Courier Prime', monospace; font-size: 8px; letter-spacing: 4px; opacity: .35; margin-bottom: 10px; }
    .market-divider { height: 1px; background: rgba(255,255,255,.08); margin-bottom: 10px; }
    .market-confidence { font-family: 'Courier Prime', monospace; font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,.25); margin-bottom: 8px; }
    .market-reason { font-size: 11px; line-height: 1.6; color: rgba(255,255,255,.4); }
    .corner { position: absolute; width: 10px; height: 10px; border-style: solid; opacity: .4; transition: border-color 1s ease; }
    .corner.tl { top: 7px; left: 7px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 7px; right: 7px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 7px; left: 7px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 7px; right: 7px; border-width: 0 1px 1px 0; }
    .quote-card {
      width: 100%; max-width: 420px; margin-top: 14px;
      border: 1px solid rgba(255,255,255,.06); border-radius: 2px;
      padding: 18px 24px; text-align: center;
      background: rgba(0,0,0,.4); backdrop-filter: blur(12px);
      opacity: 0; animation: fadeUp 1s ease .5s forwards;
    }
    .quote-text { font-size: 13px; line-height: 1.9; color: rgba(255,255,255,.45); }
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,.08); border-top-color: rgba(255,255,255,.4); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
    .loading-text { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,.25); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-sub">MARKET ORACLE ◈ GLOBAL</div>
    <div class="header-date" id="dateLabel"></div>
  </div>

  <div id="loadingWrap" style="width:100%;max-width:420px">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">分析市場資訊...</div>
    </div>
  </div>

  <div id="resultWrap" style="display:none;width:100%;max-width:420px">
    <div class="markets">
      <div class="market-card" id="card-tw">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="market-name">台股</div>
        <div class="market-arrow" id="arrow-tw">─</div>
        <div class="market-label" id="label-tw">─</div>
        <div class="market-eng" id="eng-tw">─</div>
        <div class="market-divider"></div>
        <div class="market-confidence" id="conf-tw">─</div>
        <div class="market-reason" id="reason-tw"></div>
      </div>
      <div class="market-card" id="card-us">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="market-name">美股</div>
        <div class="market-arrow" id="arrow-us">─</div>
        <div class="market-label" id="label-us">─</div>
        <div class="market-eng" id="eng-us">─</div>
        <div class="market-divider"></div>
        <div class="market-confidence" id="conf-us">─</div>
        <div class="market-reason" id="reason-us"></div>
      </div>
      <div class="market-card" id="card-jp">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="market-name">日股</div>
        <div class="market-arrow" id="arrow-jp">─</div>
        <div class="market-label" id="label-jp">─</div>
        <div class="market-eng" id="eng-jp">─</div>
        <div class="market-divider"></div>
        <div class="market-confidence" id="conf-jp">─</div>
        <div class="market-reason" id="reason-jp"></div>
      </div>
    </div>
    <div class="quote-card">
      <div class="quote-text" id="quoteText"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      漲: { arrow:"▲", label:"看漲", eng:"BULLISH", color:"#ff4d4d" },
      跌: { arrow:"▼", label:"看跌", eng:"BEARISH", color:"#00e676" },
      平: { arrow:"─", label:"平盤", eng:"NEUTRAL",  color:"#ffd600" },
    };
    const CACHE_KEY = "market_oracle_v4";

    function getTodayKey() {
      return new Date(new Date().getTime() + 8*60*60*1000).toISOString().slice(0,10);
    }
    function getCache() {
      try { const p = JSON.parse(localStorage.getItem(CACHE_KEY)); if(p?.date===getTodayKey()) return p; } catch{}
      return null;
    }
    function setCache(d) { try { localStorage.setItem(CACHE_KEY, JSON.stringify(d)); } catch{} }

    function applyMarket(key, data) {
      const c = CONFIG[data.direction] || CONFIG["平"];
      document.getElementById("arrow-"+key).textContent = c.arrow;
      document.getElementById("arrow-"+key).style.color = c.color;
      document.getElementById("label-"+key).textContent = c.label;
      document.getElementById("label-"+key).style.color = c.color;
      document.getElementById("eng-"+key).textContent = c.eng;
      document.getElementById("eng-"+key).style.color = c.color;
      document.getElementById("conf-"+key).textContent = "信心度 · " + data.confidence;
      document.getElementById("reason-"+key).textContent = data.reason || "";
      document.getElementById("card-"+key).style.borderColor = c.color + "35";
      document.getElementById("card-"+key).style.boxShadow = "0 0 40px " + c.color + "15";
      document.querySelectorAll("#card-"+key+" .corner").forEach(el => {
        el.style.borderColor = c.color;
      });
    }

    function showResult(data) {
      applyMarket("tw", data.taiwan);
      applyMarket("us", data.us);
      applyMarket("jp", data.japan);
      document.getElementById("quoteText").textContent = data.quote || "";
      document.getElementById("loadingWrap").style.display = "none";
      document.getElementById("resultWrap").style.display = "block";
    }

    const tw = new Date(new Date().getTime() + 8*60*60*1000);
    document.getElementById("dateLabel").textContent = tw.toLocaleDateString("zh-TW", {
      year:"numeric", month:"long", day:"numeric", weekday:"long"
    });

    let dots = 0;
    const dotTimer = setInterval(() => {
      const el = document.getElementById("loadingText");
      if(el) el.textContent = "分析市場資訊" + ".".repeat(++dots%4);
    }, 400);

    async function fetchPrediction() {
      const cached = getCache();
      if(cached) { showResult(cached); clearInterval(dotTimer); return; }
      try {
        const res = await fetch("/api/predict");
        if(!res.ok) throw new Error("HTTP "+res.status);
        const data = await res.json();
        if(data.error) throw new Error(data.error);
        setCache(data);
        showResult(data);
        clearInterval(dotTimer);
      } catch(e) {
        document.getElementById("loadingText").textContent = "無法取得資料，請稍後再試";
        console.error(e);
      }
    }

    fetchPrediction();
  </script>
</body>
</html>
